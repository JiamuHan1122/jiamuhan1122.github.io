<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Jiamu Han" />
    <title>文章 - Jiamu Han</title>

    <link rel="icon" href="static/assets/favicon.ico" />
    <link href="static/css/styles.css" rel="stylesheet" />

    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/marked.min.js"></script>
    <script src="static/js/blog.js"></script>

    <style>
        body {
            background: #f7f9fc;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        .post-container {
            max-width: 820px;
            margin: 110px auto 60px;
            padding: 0 20px;
        }

        /* 面包屑 */
        .post-breadcrumb {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        .post-breadcrumb a {
            color: #4c6ef5;
            text-decoration: none;
        }

        .post-breadcrumb a:hover {
            text-decoration: underline;
        }

        /* 卡片 */
        .post-card {
            background: #fff;
            border-radius: 20px;
            padding: 36px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
        }

        /* 标题 */
        .post-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 16px;
            line-height: 1.4;
        }

        /* 内容 */
        #post-content {
            line-height: 1.9;
            font-size: 1.05rem;
            color: #333;
        }

        #post-content p {
            margin-bottom: 1.2rem;
        }

        #post-content h1,
        #post-content h2,
        #post-content h3 {
            margin-top: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        #post-content h2 {
            border-left: 4px solid #4c6ef5;
            padding-left: 10px;
        }

        /* 图片 */
        #post-content img {
            display: block;
            max-width: 100%;
            height: auto;
            margin: 28px auto;
            border-radius: 14px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        #post-content img:hover {
            transform: scale(1.02);
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 18px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3b5bdb;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #dbe4ff;
        }

        /* 图片放大遮罩 */
        .img-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .img-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
        }

        .img-modal.active {
            display: flex;
        }
    </style>
</head>

<body>

<div class="post-container">

    <!-- 面包屑 -->
    <div class="post-breadcrumb">
        <a href="index.html">首页</a> /
        <a href="blog.html">博客</a> /
        <span>正文</span>
    </div>

    <div class="post-card">
        <!-- 标题 -->
        <div id="post-title" class="post-title"></div>

        <!-- 内容 -->
        <div id="post-content"></div>

        <!-- 返回 -->
        <a href="blog.html" class="back-btn">← 返回博客</a>
    </div>

</div>

<!-- 图片放大层 -->
<div id="img-modal" class="img-modal" onclick="closeModal()">
    <img id="modal-img" src="" />
</div>

<script>
/* 自动提取标题（第一行 #） */
function extractTitle(md) {
    const match = md.match(/^#\s+(.*)/);
    return match ? match[1] : "文章";
}

/* 图片点击放大 */
function enableImageZoom() {
    document.querySelectorAll("#post-content img").forEach(img => {
        img.addEventListener("click", () => {
            const modal = document.getElementById("img-modal");
            const modalImg = document.getElementById("modal-img");
            modalImg.src = img.src;
            modal.classList.add("active");
        });
    });
}

function closeModal() {
    document.getElementById("img-modal").classList.remove("active");
}

/* 重写 loadPost 增强版 */
async function loadPostEnhanced() {
    const container = document.getElementById("post-content");
    const titleEl = document.getElementById("post-title");

    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");

    if (!slug) {
        container.innerHTML = "<p>未提供文章。</p>";
        return;
    }

    try {
        const res = await fetch(`contents/posts/${slug}.md`);
        const md = await res.text();

        titleEl.innerText = extractTitle(md);

        container.innerHTML = marked.parse(md);

        enableImageZoom();

    } catch (err) {
        container.innerHTML = "<p>加载失败</p>";
    }
}

window.addEventListener("DOMContentLoaded", loadPostEnhanced);
</script>

</body>
</html>
