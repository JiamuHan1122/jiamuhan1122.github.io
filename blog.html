<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Jiamu Han 的博客页面" />
    <meta name="author" content="Jiamu Han" />
    <title>博客 - Jiamu Han</title>

    <link rel="icon" href="static/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="static/css/styles.css" rel="stylesheet" />
    <link href="static/css/main.css" rel="stylesheet" />

    <script src="static/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/js-yaml.min.js"></script>
    <script src="static/js/blog.js"></script>
</head>

<body id="page-top">

    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html">Jiamu Han</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item"><a class="nav-link me-lg-3" href="index.html">HOME</a></li>
                    <li class="nav-item"><a class="nav-link me-lg-3 active" href="blog.html">BLOG</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="blog-page-section">
        <div class="container px-5">
            <div class="blog-breadcrumb">
                <span>首页</span>
                <span class="blog-breadcrumb-sep">/</span>
                <span>博客</span>
            </div>

            <div class="blog-hero-card">
                <div class="blog-header-block">
                    <div>
                        <div class="blog-badge">学习记录</div>
                        <h1 class="blog-page-title">博客</h1>
                        <p class="blog-page-subtitle">
                            记录学习过程中的思考、技术笔记与项目实践。
                        </p>
                    </div>

                    <div class="blog-search-wrap">
                        <i class="bi bi-search blog-search-icon"></i>
                        <input
                            id="blog-search"
                            class="blog-search-input"
                            type="text"
                            placeholder="搜索文章..."
                            oninput="handleSearch()"
                        />
                    </div>
                </div>
            </div>

            <div class="blog-layout">

                <aside class="blog-sidebar">
                    <div class="blog-sidebar-card">
                        <div class="blog-sidebar-title">分类目录</div>
                        <div id="category-list" class="blog-category-list"></div>
                    </div>
                </aside>

                <main class="blog-main">
                    <div id="blog-meta-bar" class="blog-meta-bar"></div>
                    <div id="blog-list" class="blog-list"></div>
                    <div id="blog-empty" class="blog-empty-state" style="display:none;">
                        暂无相关文章
                    </div>
                </main>

            </div>
        </div>
    </section>

</body>
</html>
